name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - platform: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: windows-x86
            os: windows-latest
            target: i686-pc-windows-msvc
          # macOS
          - platform: osx-arm64
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: osx-x64
            os: macos-latest
            target: x86_64-apple-darwin
          # Linux (glibc)
          - platform: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: linux-arm
            os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
          - platform: linux-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          # Linux (musl, fully static — Alpine, NAS appliances, containers)
          - platform: linux-musl-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - platform: linux-musl-arm64
            os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use_cross: true

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust target
        if: ${{ !matrix.use_cross }}
        run: rustup target add ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.use_cross }}
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.cargo/bin"

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build (cross)
        if: ${{ matrix.use_cross }}
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (tar.gz)
        if: ${{ !startsWith(matrix.platform, 'windows') }}
        shell: bash
        run: |
          staging="Organizarr.${{ steps.version.outputs.version }}.${{ matrix.platform }}"
          mkdir "$staging"
          cp "target/${{ matrix.target }}/release/organizarr" "$staging/"
          cp LICENSE README.adoc "$staging/"
          tar -czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: ${{ startsWith(matrix.platform, 'windows') }}
        shell: pwsh
        run: |
          $staging = "Organizarr.${{ steps.version.outputs.version }}.${{ matrix.platform }}"
          New-Item -ItemType Directory -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/organizarr.exe" $staging
          Copy-Item LICENSE, README.adoc $staging
          Compress-Archive -Path $staging -DestinationPath "$staging.zip"
          "ASSET=$staging.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Organizarr-${{ matrix.platform }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          generate_release_notes: true
